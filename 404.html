<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
</head>
<body>
<script>
  const path = window.location.pathname + window.location.search + window.location.hash;
  if (path !== '/404.html') {
    window.location.replace('/#' + path);
  } else {
    window.location.replace('/');
  }
</script>
</body>
</html>
